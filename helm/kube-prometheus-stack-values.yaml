# values.yaml for kube-prometheus-stack
prometheus:
  prometheusSpec:
    serviceMonitorSelectorNilUsesHelmValues: false
    serviceMonitorSelector: {}
    serviceMonitorNamespaceSelector: {}

grafana:
  enabled: true
  adminPassword: admin # Change this in production
  # Removed additionalDataSources to fix "Only one datasource per organization can be marked as default" error.
  # We will add Loki via a sidecar ConfigMap instead.
  sidecar:
    datasources:
      enabled: true
      label: grafana_datasource

alertmanager:
  config:
    global:
      resolve_timeout: 5m
      # smtp_from: 'alertmanager@example.com'
      # smtp_smarthost: 'smtp.example.com:587'
      # smtp_auth_username: 'user'
      # smtp_auth_password: 'password'

    route:
      group_by: ['alertname', 'job']
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 12h
      receiver: 'default-receiver'
      routes:
        - match:
            severity: critical
          receiver: 'critical-receiver'

    receivers:
      - name: 'default-receiver'
        # Optional: Add generic receivers here
      
      - name: 'critical-receiver'
        webhook_configs:
          - url: 'YOUR_TEAMS_WEBHOOK_URL' # Replace with actual Teams Webhook URL
        email_configs:
          - to: 'team-alerts@example.com' # Replace with actual email
            send_resolved: true
