apiVersion: apps/v1
kind: Deployment
metadata:
  name: service-a
  namespace: apps
spec:
  replicas: 1
  selector:
    matchLabels:
      app: service-a
  template:
    metadata:
      labels:
        app: service-a
    spec:
      containers:
      - name: service-a
        image: service-a:latest 
        imagePullPolicy: IfNotPresent
        env:
        - name: SERVICE_B_URL
          value: "http://service-b.apps.svc.cluster.local:80/"
---
apiVersion: v1
kind: Service
metadata:
  name: service-a
  namespace: apps
spec:
  selector:
    app: service-a
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
