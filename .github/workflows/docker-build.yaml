name: Build and Push Docker Images

on:
  workflow_dispatch:
  # push:
  #   branches:
  #     - main
  #   paths:
  #     - 'microservices/**'

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Service-A
        uses: docker/build-push-action@v4
        with:
          context: ./microservices/service-a
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/service-a:latest
            ${{ secrets.DOCKER_USERNAME }}/service-a:${{ github.run_number }}

      - name: Build and push Service-B
        uses: docker/build-push-action@v4
        with:
          context: ./microservices/service-b
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/service-b:latest
            ${{ secrets.DOCKER_USERNAME }}/service-b:${{ github.run_number }}
